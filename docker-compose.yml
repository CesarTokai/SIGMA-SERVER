version: '3.8'

services:
  # Base de datos MySQL
  sigmav2-db:
    container_name: sigmav2_db
    build:
      context: .
      dockerfile: Dockerfile.database
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - sigmav2_mysql_data:/var/lib/mysql
    networks:
      - sigmav2_internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend Spring Boot
  sigmav2-backend:
    container_name: sigmav2_backend
    build:
      context: ./SIGMAV2-SERVICES
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://sigmav2-db:3306/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_ROOT_PASSWORD}
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET}
      APP_BASE_URL: http://${SERVER_IP}/sigmav2
      APP_UPLOAD_DIR: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - sigmav2_uploads_data:/app/uploads
    networks:
      - sigmav2_internal
      - proxy_network
    depends_on:
      sigmav2-db:
        condition: service_healthy
    restart: unless-stopped

  # Frontend Vue 3
  sigmav2-frontend:
    container_name: sigmav2_frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: /sigmav2/api
    ports:
      - "3000:80"
    networks:
      - proxy_network
    depends_on:
      - sigmav2-backend
    restart: unless-stopped

  # Nginx Proxy (distribuye rutas)
  nginx-proxy:
    container_name: nginx_proxy
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - proxy_network
    depends_on:
      - sigmav2-backend
      - sigmav2-frontend
    restart: unless-stopped

volumes:
  sigmav2_mysql_data:
    driver: local
  sigmav2_uploads_data:
    driver: local

networks:
  sigmav2_internal:
    driver: bridge
  proxy_network:
    driver: bridge
